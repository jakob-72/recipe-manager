name: Check

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    check-backend:
        name: Check Backend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: Run ktlint
              working-directory: recipe-manager-backend
              run: ./gradlew ktlintCheck

            - name: Build & Test
              working-directory: recipe-manager-backend
              run: ./gradlew build

    check-frontend:
        name: Check Frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20"

            - name: Install dependencies
              working-directory: recipe-manager-frontend
              run: npm install

            # TODO complete frontend checks (lint, test, build)
